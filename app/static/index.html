<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <title>Claude Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0a0a0a; --surface:#111111; --surface-2:#151515; --border:#252525;
      --text:#e7e7e7; --muted:#7b7b7b; --green:#22c55e; --red:#ef4444; --yellow:#eab308; --accent:#a78bfa;
    }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100dvh; padding:24px; }
    .page { width:100%; max-width:1100px; margin:0 auto; display:flex; flex-direction:column; gap:20px; }
    .header { display:flex; justify-content:space-between; gap:16px; align-items:flex-end; flex-wrap:wrap; }
    .title { font-family:'JetBrains Mono',monospace; font-size:28px; }
    .subtitle, .muted { color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:12px; }
    .status-pill { border:1px solid var(--border); border-radius:999px; padding:8px 12px; background:var(--surface); }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap:16px; }
    .panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px; display:flex; flex-direction:column; gap:16px; }
    .panel-head { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .panel-title { font-family:'JetBrains Mono',monospace; font-size:18px; }
    .badge-row { display:flex; gap:8px; flex-wrap:wrap; }
    .badge { border:1px solid var(--border); border-radius:999px; padding:4px 8px; font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--muted); }
    .badge.green { color:var(--green); border-color:rgba(34,197,94,.5); }
    .badge.yellow { color:var(--yellow); border-color:rgba(234,179,8,.5); }
    .badge.red { color:var(--red); border-color:rgba(239,68,68,.5); }
    .badge.accent { color:var(--accent); border-color:rgba(167,139,250,.5); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .form-grid .full { grid-column:1 / -1; }
    label { display:flex; flex-direction:column; gap:6px; font-size:12px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
    input { width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:12px; color:var(--text); font-family:'JetBrains Mono',monospace; }
    input:focus { outline:none; border-color:var(--accent); }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    button { background:var(--surface-2); color:var(--text); border:1px solid var(--border); border-radius:10px; padding:12px 14px; cursor:pointer; font-family:'JetBrains Mono',monospace; }
    button.primary { border-color:var(--accent); color:var(--accent); }
    button.danger { border-color:rgba(239,68,68,.4); color:var(--red); }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .session-list { display:flex; flex-direction:column; gap:10px; }
    .session-card { background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:14px; display:flex; flex-direction:column; gap:10px; }
    .session-head, .session-meta, .session-actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .session-name { font-weight:600; }
    .kv { display:flex; flex-direction:column; gap:4px; min-width:0; }
    .kv-label { color:var(--muted); font-size:11px; font-family:'JetBrains Mono',monospace; text-transform:uppercase; }
    .kv-value { font-family:'JetBrains Mono',monospace; font-size:12px; word-break:break-word; }
    .url { color:var(--green); text-decoration:none; }
    .empty { color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:12px; padding:10px 0; }
    .message { border-radius:10px; padding:12px 14px; font-family:'JetBrains Mono',monospace; font-size:12px; white-space:pre-wrap; }
    .message.info { background:#10151f; border:1px solid #1e2f47; color:#9ec5ff; }
    .message.error { background:#1a0a0a; border:1px solid #3a1a1a; color:var(--red); }
    @media (max-width:720px){ .form-grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div>
        <div class="title">Claude Launcher</div>
        <div class="subtitle">multi-session dashboard grouped by workspot</div>
      </div>
      <div class="status-pill muted" id="last-refresh">refreshing…</div>
    </div>

    <div id="message" class="message info" style="display:none"></div>
    <div id="workspots" class="grid"></div>
  </div>

  <script>
    const workspotsEl = document.getElementById('workspots');
    const messageEl = document.getElementById('message');
    const refreshEl = document.getElementById('last-refresh');
    let workspots = [];
    let sessions = [];
    let refreshTimer = null;
    let lastSessionFingerprint = '';

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function showMessage(text, kind = 'info') {
      if (!text) {
        messageEl.style.display = 'none';
        messageEl.textContent = '';
        return;
      }
      messageEl.style.display = 'block';
      messageEl.className = `message ${kind}`;
      messageEl.textContent = text;
    }

    function badgeForStatus(status) {
      if (status === 'running') return 'badge green';
      if (status === 'pending') return 'badge yellow';
      if (status === 'failed') return 'badge red';
      return 'badge';
    }

    function groupedSessions() {
      const grouped = Object.fromEntries(workspots.map(ws => [ws.name, []]));
      sessions.forEach(session => {
        if (!grouped[session.workspot]) grouped[session.workspot] = [];
        grouped[session.workspot].push(session);
      });
      return grouped;
    }

    function render() {
      const grouped = groupedSessions();
      workspotsEl.innerHTML = workspots.map(ws => {
        const wsSessions = grouped[ws.name] || [];
        return `
          <section class="panel">
            <div class="panel-head">
              <div>
                <div class="panel-title">${escapeHtml(ws.name)}</div>
                <div class="subtitle">${escapeHtml(ws.runtime)} · ${escapeHtml(ws.dir)}</div>
              </div>
              <div class="badge-row">
                <span class="badge">capacity ${escapeHtml(ws.server_capacity)}</span>
                ${ws.claude_bin ? `<span class="badge accent">${escapeHtml(ws.claude_bin)}</span>` : ''}
              </div>
            </div>

            <div class="form-grid">
              <label class="full">Existing directory
                <input id="dir-${escapeHtml(ws.name)}" placeholder="${escapeHtml(ws.dir)}" />
              </label>
              <label>Branch (optional)
                <input id="branch-${escapeHtml(ws.name)}" placeholder="feature/foo" />
              </label>
              <label>Label (optional)
                <input id="label-${escapeHtml(ws.name)}" placeholder="auth bugfix" />
              </label>
            </div>

            <div class="actions">
              <button class="primary" onclick="createSession('${escapeHtml(ws.name)}', false)">Start session</button>
              <button onclick="createSession('${escapeHtml(ws.name)}', true)">New worktree session</button>
              <button onclick="refreshData(false)">Refresh</button>
            </div>

            <div class="session-list">
              ${wsSessions.length ? wsSessions.map(renderSessionCard).join('') : '<div class="empty">No sessions yet for this workspot.</div>'}
            </div>
          </section>
        `;
      }).join('');
    }

    function renderSessionCard(session) {
      const urlCell = session.url
        ? `<a class="kv-value url" href="${escapeHtml(session.url)}" target="_blank" rel="noopener">${escapeHtml(session.url)}</a>`
        : '<span class="kv-value">waiting for URL…</span>';
      return `
        <article class="session-card">
          <div class="session-head">
            <div class="session-name">${escapeHtml(session.label || session.id)}</div>
            <div class="badge-row">
              <span class="${badgeForStatus(session.status)}">${escapeHtml(session.status)}</span>
              ${session.branch ? `<span class="badge accent">${escapeHtml(session.branch)}</span>` : ''}
            </div>
          </div>
          <div class="session-meta">
            <div class="kv">
              <span class="kv-label">URL</span>
              ${urlCell}
            </div>
          </div>
          <div class="session-meta">
            <div class="kv">
              <span class="kv-label">Working dir</span>
              <span class="kv-value">${escapeHtml(session.working_dir || '')}</span>
            </div>
          </div>
          <div class="session-actions">
            <div class="subtitle">${escapeHtml(new Date(session.created_at).toLocaleString())}</div>
            <div class="actions">
              ${session.url ? `<button onclick="window.open('${escapeHtml(session.url)}', '_blank', 'noopener')">Open</button>` : ''}
              ${session.url ? `<button onclick="navigator.clipboard.writeText('${escapeHtml(session.url)}')">Copy URL</button>` : ''}
              <button class="danger" onclick="killSession('${escapeHtml(session.id)}')">Kill</button>
            </div>
          </div>
        </article>
      `;
    }

    async function createSession(workspot, worktree) {
      const directory = document.getElementById(`dir-${workspot}`).value.trim();
      const branch = document.getElementById(`branch-${workspot}`).value.trim();
      const label = document.getElementById(`label-${workspot}`).value.trim();
      showMessage(worktree ? 'Starting worktree session…' : 'Starting session…');
      try {
        const res = await fetch(worktree ? '/start-worktree' : '/api/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            workspot,
            worktree,
            directory: directory || null,
            branch: branch || null,
            label: label || null,
          }),
        });
        const data = await res.json();
        if (data.status !== 'ok') {
          showMessage(data.message || 'Failed to start session.', 'error');
          return;
        }
        if (data.pending_url) {
          showMessage(data.message || 'Session started and is waiting for URL capture.');
        } else {
          showMessage(`Session ready: ${data.session?.label || workspot}`);
        }
        await refreshData(true);
      } catch (error) {
        showMessage('Could not reach launcher server.', 'error');
      }
    }

    async function killSession(sessionId) {
      try {
        const res = await fetch(`/api/sessions/${sessionId}/kill`, { method: 'POST' });
        const data = await res.json();
        if (data.status !== 'ok') {
          showMessage(data.message || 'Failed to kill session.', 'error');
          return;
        }
        showMessage(`Killed session ${sessionId}`);
        await refreshData(false);
      } catch {
        showMessage('Could not kill session.', 'error');
      }
    }

    async function refreshData(boostPoll = false) {
      const [workspotsRes, sessionsRes] = await Promise.all([
        fetch('/api/workspots'),
        fetch('/api/sessions'),
      ]);
      workspots = await workspotsRes.json();
      sessions = await sessionsRes.json();
      refreshEl.textContent = `updated ${new Date().toLocaleTimeString()}`;
      const fingerprint = JSON.stringify(sessions.map(s => [s.id, s.status, s.url]));
      if (fingerprint !== lastSessionFingerprint && sessions.some(s => s.url)) {
        showMessage(`Dashboard refreshed — ${sessions.filter(s => s.url).length} session URL(s) captured.`);
      }
      lastSessionFingerprint = fingerprint;
      render();
      schedulePoll(boostPoll || sessions.some(s => s.status === 'pending' && !s.url));
    }

    function schedulePoll(fast) {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => refreshData(false).catch(() => {
        showMessage('Failed to refresh dashboard.', 'error');
        schedulePoll(false);
      }), fast ? 2000 : 10000);
    }

    refreshData(true).catch(() => showMessage('Failed to load dashboard.', 'error'));
  </script>
</body>
</html>
